name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]

    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DGDRPG_BUILD_DEMO=ON
          -DGDRPG_BUILD_TESTS=ON
          -DGDRPG_BUILD_EXTENSION=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --test-dir build --output-on-failure -C ${{ matrix.build_type }}

      # Avoid Git Bash + find -executable + xargs on Windows (exit 127).
      # Binary is gdrpg_demo on Unix and gdrpg_demo.exe on Windows.
      - name: Run demo (Linux)
        if: runner.os == 'Linux'
        run: ./build/demo/gdrpg_demo ./data

      - name: Run demo (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $demo = "build/demo/gdrpg_demo.exe"
          if (-not (Test-Path $demo)) {
            throw "Demo executable not found: $demo"
          }
          & $demo "$PWD/data"
          if ($LASTEXITCODE -ne 0) {
            throw "Demo exited with code $LASTEXITCODE"
          }
